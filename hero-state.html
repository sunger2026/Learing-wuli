<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰火·物态 - 热现象 | 物理王者</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bronze: #cd7f32; --silver: #c0c0c0; --gold: #ffd700;
            --platinum: #3eb489; --diamond: #b9f2ff; --star: #e6e6fa;
            --king: #ff6b35; --dark-bg: #0a0e1a; --card-bg: rgba(20, 25, 45, 0.95);
            --accent: #00d4ff; --accent-gold: #ffb800;
            --success: #32cd32; --error: #ff4444;
            --basic-purple: #9370db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--accent-gold), var(--king));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }
        .hero-header {
            background: linear-gradient(135deg, rgba(100,149,237,0.15), rgba(255,69,0,0.15));
            border: 1px solid rgba(100,149,237,0.3);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .hero-title-section {
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
            z-index: 1;
        }
        .hero-avatar {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, #6495ed, #ff4500);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .hero-meta { flex: 1; }
        .hero-name-large {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .hero-tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(100,149,237,0.2);
            color: #6495ed;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .video-container {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #stateAnimation { width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; }
        .video-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
        }
        .play-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            background: linear-gradient(135deg, var(--accent), var(--accent-gold));
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }
        .progress-bar-video {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-fill-video {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-gold));
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .mute-btn {
            padding: 10px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
        }
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .knowledge-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .knowledge-card.important {
            border-color: var(--accent-gold);
            background: linear-gradient(135deg, rgba(255,184,0,0.1), rgba(0,0,0,0.3));
        }
        .knowledge-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .example-box {
            background: linear-gradient(135deg, rgba(255,184,0,0.1), rgba(0,0,0,0.3));
            border: 1px solid rgba(255,184,0,0.3);
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
        }
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            margin: 8px 0;
        }
        .quiz-option:hover { background: rgba(255,255,255,0.1); border-color: var(--basic-purple); }
        .quiz-option.correct { border-color: var(--success); background: rgba(50,205,50,0.1); }
        .quiz-option.wrong { border-color: var(--error); background: rgba(255,68,68,0.1); }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-gold)); color: #000; }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">物理王者</div>
        </a>
        <a href="index.html" class="back-btn">← 返回英雄列表</a>
    </header>

    <main class="main-container">
        <section class="hero-header">
            <div class="hero-title-section">
                <div class="hero-avatar">❄️</div>
                <div class="hero-meta">
                    <h1 class="hero-name-large">冰火·物态 <span class="hero-tag">热学系</span></h1>
                    <p>熔化、凝固、汽化、液化、升华、凝华。王昭君带你了解物态变化！</p>
                </div>
            </div>
        </section>

        <section class="learning-section">
            <h2>🎬 动画讲解：王昭君的冰雪魔法</h2>
            <div class="video-container">
                <canvas id="stateAnimation" width="800" height="400"></canvas>
                <div class="video-controls">
                    <button class="play-btn" onclick="toggleAnimation()"><span id="playIcon">▶️</span> <span id="playText">播放动画</span></button>
                    <div class="progress-bar-video" onclick="seekAnimation(event)"><div class="progress-fill-video" id="videoProgress"></div></div>
                    <button class="mute-btn" onclick="toggleMute()">🔊</button>
                </div>
            </div>
        </section>

        <section class="learning-section">
            <h2>📖 核心知识点</h2>
            <div class="knowledge-grid">
                <div class="knowledge-card important">
                    <div class="knowledge-title">❄️ 物态变化</div>
                    <p>熔化：固态→液态（吸热）</p>
                    <p>凝固：液态→固态（放热）</p>
                    <p>汽化：液态→气态（吸热）</p>
                    <p>液化：气态→液态（放热）</p>
                    <p>升华：固态→气态（吸热）</p>
                    <p>凝华：气态→固态（放热）</p>
                </div>
                <div class="knowledge-card">
                    <div class="knowledge-title">🌡️ 熔点与沸点</div>
                    <p>晶体有固定的熔点（如冰0℃）</p>
                    <p>非晶体没有固定的熔点</p>
                    <p>标准大气压下水的沸点是100℃</p>
                </div>
            </div>
        </section>

        <div class="action-buttons">
            <a href="index.html" class="btn btn-primary">✅ 完成学习</a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('stateAnimation');
        const ctx = canvas.getContext('2d');
        let isPlaying = false, animationId, startTime = 0, currentScene = 0;
        let isMuted = false;
        let particles = [];

        const scenes = [
            { duration: 6, name: "intro", text: "欢迎来到冰火·物态！学习物态变化" },
            { duration: 8, name: "melt", text: "冰雪熔化：固态冰变成液态水，吸热" },
            { duration: 8, name: "vaporize", text: "水汽化：液态水变成水蒸气，吸热" },
            { duration: 8, name: "condense", text: "水蒸气液化：气态变成液态，放热" },
            { duration: 8, name: "freeze", text: "水凝固：液态变成固态，放热" },
            { duration: 6, name: "end", text: "物态变化：吸热三变（熔汽升），放热三变（凝液凝）" }
        ];

        const sceneScripts = [
            "欢迎来到冰火·物态！我是王昭君，带你了解物态变化的奥秘！",
            "冰雪熔化：固态冰吸收热量变成液态水！",
            "水汽化：液态水吸收热量变成水蒸气！",
            "水蒸气遇冷液化：气态放热变成液态！",
            "水凝固：液态水放热变成固态冰！",
            "记住口诀：吸热三变是熔化、汽化、升华；放热三变是凝固、液化、凝华！"
        ];

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a1f3a');
            grad.addColorStop(1, '#0d1020');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawWangZhaojun(x, y) {
            ctx.fillStyle = '#6495ed';
            ctx.beginPath();
            ctx.arc(x, y-30, 25, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#4682b4';
            ctx.fillRect(x-20, y-5, 40, 60);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x-30, y-10, 20, 30);
            ctx.fillRect(x+10, y-10, 20, 30);
        }

        function drawIce(x, y, size, melting) {
            ctx.fillStyle = melting ? 'rgba(200,230,255,0.6)' : 'rgba(200,230,255,0.9)';
            ctx.beginPath();
            ctx.moveTo(x, y-size);
            ctx.lineTo(x+size, y);
            ctx.lineTo(x, y+size);
            ctx.lineTo(x-size, y);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#b0e0e6';
            ctx.stroke();
        }

        function drawWater(x, y, w, h) {
            ctx.fillStyle = 'rgba(100,149,237,0.6)';
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = '#4682b4';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, w, h);
        }

        function drawSteam(x, y, opacity) {
            ctx.fillStyle = `rgba(255,255,255,${opacity})`;
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, Math.PI*2);
            ctx.fill();
        }

        function drawSubtitle(text) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(50, 340, 700, 45);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px "Noto Sans SC", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, 400, 370);
        }

        function animate(timestamp) {
            if (!isPlaying) return;
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1000;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            let sceneTime = 0;
            for (let i = 0; i < scenes.length; i++) {
                if (elapsed < sceneTime + scenes[i].duration) {
                    currentScene = i;
                    break;
                }
                sceneTime += scenes[i].duration;
            }

            const scene = scenes[currentScene];
            const sceneElapsed = elapsed - sceneTime;
            const totalDuration = scenes.reduce((sum, s) => sum + s.duration, 0);
            const totalProgress = Math.min(elapsed / totalDuration, 1);
            document.getElementById('videoProgress').style.width = (totalProgress * 100) + '%';

            switch(scene.name) {
                case 'intro':
                    drawWangZhaojun(400, 200);
                    ctx.fillStyle = '#6495ed';
                    ctx.font = 'bold 28px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('❄️ 冰火·物态 🔥', 400, 120);
                    break;
                case 'melt':
                    drawWangZhaojun(100, 250);
                    const meltProgress = Math.min(sceneElapsed / 4, 1);
                    for (let i = 0; i < 5; i++) {
                        drawIce(300 + i*80, 200, 30 - meltProgress*10, true);
                    }
                    if (meltProgress > 0.5) {
                        ctx.fillStyle = 'rgba(100,149,237,0.5)';
                        ctx.fillRect(250, 250, 400, 30 * meltProgress);
                    }
                    ctx.fillStyle = '#ff6b35';
                    ctx.fillText('🔥 吸热熔化', 600, 150);
                    break;
                case 'vaporize':
                    drawWater(300, 250, 200, 50);
                    for (let i = 0; i < 5; i++) {
                        const y = 250 - (sceneElapsed * 20 + i*30) % 150;
                        drawSteam(350 + i*30, y, 0.5);
                    }
                    ctx.fillStyle = '#ff6b35';
                    ctx.fillText('🔥 吸热汽化', 600, 150);
                    break;
                case 'condense':
                    for (let i = 0; i < 5; i++) {
                        const y = 100 + i*30;
                        drawSteam(350 + i*30, y, 0.3);
                    }
                    ctx.fillStyle = '#00d4ff';
                    ctx.beginPath();
                    ctx.arc(400, 300, 20, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillText('❄️ 放热液化', 600, 150);
                    break;
                case 'freeze':
                    drawWater(300, 250, 200, 50);
                    ctx.fillStyle = '#00d4ff';
                    ctx.fillText('❄️ 放热凝固', 600, 150);
                    if (sceneElapsed > 2) {
                        for (let i = 0; i < 5; i++) {
                            drawIce(300 + i*40, 275, 15, false);
                        }
                    }
                    break;
                case 'end':
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 22px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('吸热三变：熔化、汽化、升华', 400, 150);
                    ctx.fillText('放热三变：凝固、液化、凝华', 400, 200);
                    drawWangZhaojun(400, 280);
                    break;
            }

            drawSubtitle(sceneScripts[currentScene]);

            if (Math.floor(sceneElapsed) === 1 && !scene.spoken) {
                speakText(sceneScripts[currentScene]);
                scene.spoken = true;
            }

            if (totalProgress < 1) {
                animationId = requestAnimationFrame(animate);
            } else {
                stopAnimation();
            }
        }

        function speakText(text) {
            if (isMuted || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = 1.1;
            window.speechSynthesis.speak(utter);
        }

        function toggleAnimation() {
            if (isPlaying) {
                stopAnimation();
            } else {
                startAnimation();
            }
        }

        function startAnimation() {
            isPlaying = true;
            startTime = 0;
            scenes.forEach(s => s.spoken = false);
            document.getElementById('playIcon').textContent = '⏸️';
            document.getElementById('playText').textContent = '暂停';
            animationId = requestAnimationFrame(animate);
        }

        function stopAnimation() {
            isPlaying = false;
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('playIcon').textContent = '▶️';
            document.getElementById('playText').textContent = '播放动画';
            window.speechSynthesis.cancel();
        }

        function seekAnimation(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const totalDuration = scenes.reduce((sum, s) => sum + s.duration, 0);
            const targetTime = percent * totalDuration;
            if (isPlaying) {
                startTime = performance.now() - targetTime * 1000;
            }
            document.getElementById('videoProgress').style.width = (percent * 100) + '%';
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelector('.mute-btn').textContent = isMuted ? '🔇' : '🔊';
            if (isMuted) window.speechSynthesis.cancel();
        }

        drawBackground();
        drawSubtitle('点击播放开始学习物态变化！');
    </script>
</body>
</html>
