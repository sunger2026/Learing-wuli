<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光芒·反射 - 光现象 | 物理王者</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bronze: #cd7f32; --silver: #c0c0c0; --gold: #ffd700;
            --platinum: #3eb489; --diamond: #b9f2ff; --star: #e6e6fa;
            --king: #ff6b35; --dark-bg: #0a0e1a; --card-bg: rgba(20, 25, 45, 0.95);
            --accent: #00d4ff; --accent-gold: #ffb800;
            --success: #32cd32; --error: #ff4444;
            --basic-purple: #9370db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        .header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--accent-gold), var(--king));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }
        .hero-header {
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,140,0,0.15));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        .hero-title-section {
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
            z-index: 1;
        }
        .hero-avatar {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        .hero-meta { flex: 1; }
        .hero-name-large {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .hero-tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .video-container {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-player {
            position: relative;
            background: linear-gradient(135deg, #1a1f3a, #0d1020);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #lightAnimation { width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; }
        .video-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
        }
        .play-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 25px;
            background: linear-gradient(135deg, var(--accent), var(--accent-gold));
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }
        .progress-bar-video {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-fill-video {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-gold));
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .mute-btn {
            padding: 10px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            cursor: pointer;
            font-size: 18px;
        }
        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .knowledge-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .knowledge-card.important {
            border-color: var(--accent-gold);
            background: linear-gradient(135deg, rgba(255,184,0,0.1), rgba(0,0,0,0.3));
        }
        .knowledge-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .formula-box {
            background: rgba(147,112,219,0.1);
            border-left: 4px solid var(--basic-purple);
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 0 12px 12px 0;
            font-size: 20px;
            color: var(--basic-purple);
            text-align: center;
        }
        .example-box {
            background: linear-gradient(135deg, rgba(255,184,0,0.1), rgba(0,0,0,0.3));
            border: 1px solid rgba(255,184,0,0.3);
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
        }
        .example-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-gold);
        }
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            margin: 8px 0;
        }
        .quiz-option:hover { background: rgba(255,255,255,0.1); border-color: var(--basic-purple); }
        .quiz-option.correct { border-color: var(--success); background: rgba(50,205,50,0.1); }
        .quiz-option.wrong { border-color: var(--error); background: rgba(255,68,68,0.1); }
        .quiz-feedback { margin-top: 15px; padding: 15px 20px; border-radius: 12px; font-weight: 600; display: none; }
        .quiz-feedback.show { display: block; }
        .quiz-feedback.correct { background: rgba(50,205,50,0.2); color: var(--success); }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-gold)); color: #000; }
        .btn-secondary { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">⚡</div>
            <div class="logo-text">物理王者</div>
        </a>
        <a href="index.html" class="back-btn">← 返回英雄列表</a>
    </header>

    <main class="main-container">
        <section class="hero-header">
            <div class="hero-title-section">
                <div class="hero-avatar">☀️</div>
                <div class="hero-meta">
                    <h1 class="hero-name-large">光芒·反射 <span class="hero-tag">基础系</span></h1>
                    <p>光的直线传播、反射定律、平面镜成像。学会光学，就像掌握了后羿的日之塔！</p>
                </div>
            </div>
        </section>

        <section class="learning-section">
            <h2>🎬 动画讲解：后羿射箭的光学原理</h2>
            <div class="video-container">
                <canvas id="lightAnimation" width="800" height="400"></canvas>
                <div class="video-controls">
                    <button class="play-btn" onclick="toggleAnimation()"><span id="playIcon">▶️</span> <span id="playText">播放动画</span></button>
                    <div class="progress-bar-video" onclick="seekAnimation(event)"><div class="progress-fill-video" id="videoProgress"></div></div>
                    <button class="mute-btn" onclick="toggleMute()">🔊</button>
                </div>
            </div>
        </section>

        <section class="learning-section">
            <h2>📖 核心知识点</h2>
            <div class="knowledge-grid">
                <div class="knowledge-card important">
                    <div class="knowledge-title">⚡ 光的直线传播</div>
                    <p>光速：真空中 c = 3×10⁸ m/s（最大）</p>
                    <p>现象：影子、日食、月食、小孔成像</p>
                </div>
                <div class="knowledge-card">
                    <div class="knowledge-title">🔍 光的反射定律</div>
                    <div class="formula-box">入射角 = 反射角</div>
                    <p>三线共面、两线分居、反射角等于入射角</p>
                </div>
            </div>
        </section>

        <div class="action-buttons">
            <a href="index.html" class="btn btn-primary">✅ 完成学习</a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('lightAnimation');
        const ctx = canvas.getContext('2d');
        let isPlaying = false, animationId, startTime = 0, currentScene = 0;
        let isMuted = false;

        const scenes = [
            { duration: 6, name: "intro", text: "欢迎来到光芒·反射！学习光的传播与反射" },
            { duration: 8, name: "straight", text: "光沿直线传播！后羿射箭时要对准目标" },
            { duration: 8, name: "reflection", text: "光的反射定律：入射角等于反射角" },
            { duration: 8, name: "mirror", text: "平面镜成像：等大、等距、虚像" },
            { duration: 6, name: "end", text: "记住：光沿直线传播，反射角等于入射角！" }
        ];

        const sceneScripts = [
            "欢迎来到光芒·反射！我是后羿，今天带大家学习光学知识！",
            "光沿直线传播！就像我的箭，直直地飞向目标！",
            "遇到镜面会发生反射。记住：入射角等于反射角！",
            "平面镜成像特点是：等大、等距、成虚像！",
            "记住：光沿直线传播，反射角等于入射角！"
        ];

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a1f3a');
            grad.addColorStop(1, '#0d1020');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawHouyi(x, y, aiming) {
            ctx.fillStyle = '#d4a853';
            ctx.beginPath();
            ctx.arc(x, y-30, 25, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(x-20, y-5, 40, 50);
            ctx.strokeStyle = '#654321';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x-20, y+10);
            ctx.lineTo(x-60, y-20);
            ctx.lineTo(x-60, y+40);
            ctx.stroke();
            if (aiming) {
                ctx.strokeStyle = '#ff6b35';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(x-60, y+10);
                ctx.lineTo(x+200, y+10);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function drawArrow(x, y) {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.moveTo(x, y-3);
            ctx.lineTo(x+30, y-3);
            ctx.lineTo(x+30, y-8);
            ctx.lineTo(x+45, y);
            ctx.lineTo(x+30, y+8);
            ctx.lineTo(x+30, y+3);
            ctx.lineTo(x, y+3);
            ctx.fill();
        }

        function drawMirror(x, y, w, h) {
            ctx.fillStyle = 'rgba(200,200,255,0.3)';
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);
            for (let i = 0; i < h; i += 10) {
                ctx.beginPath();
                ctx.moveTo(x+5, y+i);
                ctx.lineTo(x+w-5, y+i+5);
                ctx.stroke();
            }
        }

        function drawLightRay(x1, y1, x2, y2, color='#ffd700') {
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawSubtitle(text) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(50, 340, 700, 45);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px "Noto Sans SC", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, 400, 370);
        }

        function animate(timestamp) {
            if (!isPlaying) return;
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1000;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            let sceneTime = 0;
            for (let i = 0; i < scenes.length; i++) {
                if (elapsed < sceneTime + scenes[i].duration) {
                    currentScene = i;
                    break;
                }
                sceneTime += scenes[i].duration;
            }

            const scene = scenes[currentScene];
            const sceneElapsed = elapsed - sceneTime;
            const totalDuration = scenes.reduce((sum, s) => sum + s.duration, 0);
            const totalProgress = Math.min(elapsed / totalDuration, 1);
            document.getElementById('videoProgress').style.width = (totalProgress * 100) + '%';

            switch(scene.name) {
                case 'intro':
                    drawHouyi(150, 200, false);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('☀️ 光芒·反射 ☀️', 400, 150);
                    break;
                case 'straight':
                    drawHouyi(100, 250, true);
                    const arrowX = 100 + sceneElapsed * 50;
                    if (arrowX < 600) drawArrow(arrowX, 260);
                    drawLightRay(40, 260, arrowX, 260);
                    ctx.fillStyle = '#ff6b35';
                    ctx.beginPath();
                    ctx.arc(650, 260, 20, 0, Math.PI*2);
                    ctx.fill();
                    break;
                case 'reflection':
                    drawMirror(350, 100, 100, 200);
                    drawLightRay(100, 300, 350, 200);
                    drawLightRay(350, 200, 600, 100);
                    ctx.strokeStyle = '#fff';
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(350, 300);
                    ctx.lineTo(450, 100);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = '#00d4ff';
                    ctx.font = '14px sans-serif';
                    ctx.fillText('法线', 460, 150);
                    ctx.fillText('入射角', 280, 260);
                    ctx.fillText('反射角', 480, 160);
                    break;
                case 'mirror':
                    drawMirror(300, 50, 200, 300);
                    ctx.fillStyle = '#d4a853';
                    ctx.beginPath();
                    ctx.arc(150, 200, 30, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#ffd700';
                    ctx.setLineDash([3, 3]);
                    ctx.beginPath();
                    ctx.arc(650, 200, 30, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = '#fff';
                    ctx.fillText('物体', 150, 250);
                    ctx.fillText('虚像', 650, 250);
                    break;
                case 'end':
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 28px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('入射角 = 反射角', 400, 200);
                    drawHouyi(150, 280, true);
                    break;
            }

            drawSubtitle(sceneScripts[currentScene]);

            if (Math.floor(sceneElapsed) === 1 && !scene.spoken) {
                speakText(sceneScripts[currentScene]);
                scene.spoken = true;
            }

            if (totalProgress < 1) {
                animationId = requestAnimationFrame(animate);
            } else {
                stopAnimation();
            }
        }

        function speakText(text) {
            if (isMuted || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = 1.1;
            window.speechSynthesis.speak(utter);
        }

        function toggleAnimation() {
            if (isPlaying) {
                stopAnimation();
            } else {
                startAnimation();
            }
        }

        function startAnimation() {
            isPlaying = true;
            startTime = 0;
            scenes.forEach(s => s.spoken = false);
            document.getElementById('playIcon').textContent = '⏸️';
            document.getElementById('playText').textContent = '暂停';
            animationId = requestAnimationFrame(animate);
        }

        function stopAnimation() {
            isPlaying = false;
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('playIcon').textContent = '▶️';
            document.getElementById('playText').textContent = '播放动画';
            window.speechSynthesis.cancel();
        }

        function seekAnimation(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const totalDuration = scenes.reduce((sum, s) => sum + s.duration, 0);
            const targetTime = percent * totalDuration;
            if (isPlaying) {
                startTime = performance.now() - targetTime * 1000;
            }
            document.getElementById('videoProgress').style.width = (percent * 100) + '%';
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelector('.mute-btn').textContent = isMuted ? '🔇' : '🔊';
            if (isMuted) window.speechSynthesis.cancel();
        }

        function checkAnswer(el, letter, correct, feedbackId) {
            const item = el.closest('.quiz-item');
            if (item.dataset.answered) return;
            item.dataset.answered = 'true';
            el.classList.add(correct ? 'correct' : 'wrong');
            document.getElementById(feedbackId).className = 'quiz-feedback show ' + (correct ? 'correct' : '');
            document.getElementById(feedbackId).textContent = correct ? '🎉 回答正确！' : '❌ 回答错误';
            if (!correct) {
                item.querySelectorAll('.quiz-option').forEach(opt => {
                    if (opt.onclick.toString().includes('true')) opt.classList.add('correct');
                });
            }
        }

        drawBackground();
        drawSubtitle('点击播放开始学习光学知识！');
    </script>
</body>
</html>
