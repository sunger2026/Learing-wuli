<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杠杆·机械 - 简单机械 | 物理王者</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bronze: #cd7f32; --silver: #c0c0c0; --gold: #ffd700; --platinum: #3eb489; --diamond: #b9f2ff; --star: #e6e6fa; --king: #ff6b35; --dark-bg: #0a0e1a; --card-bg: rgba(20, 25, 45, 0.95); --accent: #00d4ff; --accent-gold: #ffb800; --success: #32cd32; --error: #ff4444; --basic-purple: #9370db; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--dark-bg); min-height: 100vh; color: #fff; overflow-x: hidden; }
        .header { background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, var(--accent-gold), var(--king)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; }
        .logo-text { font-size: 24px; font-weight: 900; background: linear-gradient(90deg, var(--accent-gold), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; color: #fff; text-decoration: none; font-weight: 600; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px 40px 60px; }
        .hero-header { background: linear-gradient(135deg, rgba(34,139,34,0.15), rgba(255,215,0,0.15)); border: 1px solid rgba(34,139,34,0.3); border-radius: 20px; padding: 40px; margin-bottom: 30px; }
        .hero-title-section { display: flex; align-items: center; gap: 30px; }
        .hero-avatar { width: 120px; height: 120px; background: linear-gradient(135deg, #228b22, #ffd700); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
        .hero-meta { flex: 1; }
        .hero-name-large { font-size: 36px; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .hero-tag { display: inline-block; padding: 6px 16px; background: rgba(34,139,34,0.2); color: #32cd32; border-radius: 20px; font-size: 14px; font-weight: 600; }
        .video-container { background: rgba(0,0,0,0.5); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        #leverAnimation { width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; }
        .video-controls { display: flex; align-items: center; gap: 15px; padding: 15px 20px; background: rgba(0,0,0,0.5); }
        .play-btn { display: flex; align-items: center; gap: 8px; padding: 10px 25px; background: linear-gradient(135deg, var(--accent), var(--accent-gold)); border: none; border-radius: 25px; color: #000; font-weight: 700; cursor: pointer; }
        .progress-bar-video { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; cursor: pointer; }
        .progress-fill-video { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-gold)); border-radius: 3px; transition: width 0.1s linear; }
        .mute-btn { padding: 10px 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; cursor: pointer; font-size: 18px; }
        .knowledge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .knowledge-card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .knowledge-card.important { border-color: var(--accent-gold); background: linear-gradient(135deg, rgba(255,184,0,0.1), rgba(0,0,0,0.3)); }
        .knowledge-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .formula-box { background: rgba(147,112,219,0.1); border-left: 4px solid var(--basic-purple); padding: 15px 20px; margin: 15px 0; border-radius: 0 12px 12px 0; font-size: 20px; color: var(--basic-purple); text-align: center; }
        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 15px 40px; border-radius: 30px; font-weight: 700; font-size: 16px; text-decoration: none; border: none; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-gold)); color: #000; }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo"><div class="logo-icon">⚡</div><div class="logo-text">物理王者</div></a>
        <a href="index.html" class="back-btn">← 返回英雄列表</a>
    </header>

    <main class="main-container">
        <section class="hero-header">
            <div class="hero-title-section">
                <div class="hero-avatar">⚙️</div>
                <div class="hero-meta">
                    <h1 class="hero-name-large">杠杆·机械 <span class="hero-tag">力学系</span></h1>
                    <p>杠杆平衡、滑轮组、机械效率。关羽带你探索简单机械！</p>
                </div>
            </div>
        </section>

        <section class="learning-section">
            <h2>🎬 动画讲解：关羽的青龙偃月杠杆</h2>
            <div class="video-container">
                <canvas id="leverAnimation" width="800" height="400"></canvas>
                <div class="video-controls">
                    <button class="play-btn" onclick="toggleAnimation()"><span id="playIcon">▶️</span> <span id="playText">播放动画</span></button>
                    <div class="progress-bar-video" onclick="seekAnimation(event)"><div class="progress-fill-video" id="videoProgress"></div></div>
                    <button class="mute-btn" onclick="toggleMute()">🔊</button>
                </div>
            </div>
        </section>

        <section class="learning-section">
            <h2>📖 核心知识点</h2>
            <div class="knowledge-grid">
                <div class="knowledge-card important">
                    <div class="knowledge-title">⚙️ 杠杆平衡条件</div>
                    <div class="formula-box">F₁ × L₁ = F₂ × L₂</div>
                    <p>动力 × 动力臂 = 阻力 × 阻力臂</p>
                    <p>省力杠杆：L₁ > L₂</p>
                    <p>费力杠杆：L₁ < L₂</p>
                    <p>等臂杠杆：L₁ = L₂</p>
                </div>
                <div class="knowledge-card">
                    <div class="knowledge-title">🔧 滑轮组</div>
                    <p>定滑轮：改变力的方向，不省力</p>
                    <p>动滑轮：省一半力，不改变方向</p>
                    <p>滑轮组：F = G/n（n为承担重物的绳子段数）</p>
                </div>
            </div>
        </section>

        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 40px;">
            <a href="index.html" class="btn btn-primary">✅ 完成学习</a>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('leverAnimation');
        const ctx = canvas.getContext('2d');
        let isPlaying = false, animationId, startTime = 0, currentScene = 0;
        let isMuted = false;

        const scenes = [
            { duration: 6, name: "intro", text: "欢迎来到杠杆·机械！学习简单机械" },
            { duration: 8, name: "lever", text: "杠杆平衡条件：F₁L₁=F₂L₂" },
            { duration: 8, name: "types", text: "省力杠杆、费力杠杆、等臂杠杆" },
            { duration: 8, name: "pulley", text: "定滑轮和动滑轮" },
            { duration: 6, name: "end", text: "杠杆原理：动力×动力臂=阻力×阻力臂" }
        ];

        const sceneScripts = [
            "欢迎来到杠杆·机械！我是关羽，今天带大家学习简单机械！",
            "杠杆平衡条件：动力乘以动力臂等于阻力乘以阻力臂！",
            "杠杆分为省力杠杆、费力杠杆和等臂杠杆三种！",
            "定滑轮改变力的方向，动滑轮可以省力！",
            "记住：杠杆平衡条件是动力乘动力臂等于阻力乘阻力臂！"
        ];

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a1f3a');
            grad.addColorStop(1, '#0d1020');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawLever(centerX, centerY, angle, leftWeight, rightWeight) {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(angle);
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(-150, -5, 300, 10);
            ctx.restore();
            ctx.fillStyle = '#696969';
            ctx.beginPath();
            ctx.moveTo(centerX, centerY-20);
            ctx.lineTo(centerX-15, centerY+30);
            ctx.lineTo(centerX+15, centerY+30);
            ctx.fill();
            ctx.fillStyle = '#ff6b35';
            ctx.fillRect(centerX-150-leftWeight/2, centerY-30-Math.sin(angle)*150, leftWeight, leftWeight);
            ctx.fillStyle = '#00d4ff';
            ctx.fillRect(centerX+150-rightWeight/2, centerY-30+Math.sin(angle)*150, rightWeight, rightWeight);
        }

        function drawSubtitle(text) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(50, 340, 700, 45);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px "Noto Sans SC", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, 400, 370);
        }

        function animate(timestamp) {
            if (!isPlaying) return;
            if (!startTime) startTime = timestamp;
            const elapsed = (timestamp - startTime) / 1000;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            let sceneTime = 0;
            for (let i = 0; i < scenes.length; i++) {
                if (elapsed < sceneTime + scenes[i].duration) {
                    currentScene = i;
                    break;
                }
                sceneTime += scenes[i].duration;
            }

            const scene = scenes[currentScene];
            const sceneElapsed = elapsed - sceneTime;
            const totalDuration = scenes.reduce((sum, s) => sum + s.duration, 0);
            const totalProgress = Math.min(elapsed / totalDuration, 1);
            document.getElementById('videoProgress').style.width = (totalProgress * 100) + '%';

            switch(scene.name) {
                case 'intro':
                    ctx.fillStyle = '#32cd32';
                    ctx.font = 'bold 28px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚙️ 杠杆·机械 ⚙️', 400, 200);
                    break;
                case 'lever':
                    drawLever(400, 250, Math.sin(sceneElapsed)*0.2, 40, 40);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.fillText('F₁ × L₁ = F₂ × L₂', 400, 150);
                    break;
                case 'types':
                    drawLever(200, 250, 0.1, 30, 60);
                    drawLever(400, 250, 0, 40, 40);
                    drawLever(600, 250, -0.1, 60, 30);
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px sans-serif';
                    ctx.fillText('省力', 180, 320);
                    ctx.fillText('等臂', 400, 320);
                    ctx.fillText('费力', 620, 320);
                    break;
                case 'pulley':
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(300, 150, 30, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(270, 150);
                    ctx.lineTo(270, 300);
                    ctx.moveTo(330, 150);
                    ctx.lineTo(330, 300);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(500, 250, 30, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(500, 220);
                    ctx.lineTo(500, 100);
                    ctx.lineTo(550, 100);
                    ctx.lineTo(550, 300);
                    ctx.stroke();
                    break;
                case 'end':
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('F₁ × L₁ = F₂ × L₂', 400, 200);
                    break;
            }

            drawSubtitle(sceneScripts[currentScene]);

            if (Math.floor(sceneElapsed) === 1 && !scene.spoken) {
                speakText(sceneScripts[currentScene]);
                scene.spoken = true;
            }

            if (totalProgress < 1) {
                animationId = requestAnimationFrame(animate);
            } else {
                stopAnimation();
            }
        }

        function speakText(text) {
            if (isMuted || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = 1.1;
            window.speechSynthesis.speak(utter);
        }

        function toggleAnimation() {
            if (isPlaying) {
                stopAnimation();
            } else {
                startAnimation();
            }
        }

        function startAnimation() {
            isPlaying = true;
            startTime = 0;
            scenes.forEach(s => s.spoken = false);
            document.getElementById('playIcon').textContent = '⏸️';
            document.getElementById('playText').textContent = '暂停';
            animationId = requestAnimationFrame(animate);
        }

        function stopAnimation() {
            isPlaying = false;
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('playIcon').textContent = '▶️';
            document.getElementById('playText').textContent = '播放动画';
            window.speechSynthesis.cancel();
        }

        function seekAnimation(e) {
            const rect = e.currentTarget.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            const totalDuration = scenes.reduce((sum, s) => sum + s.duration, 0);
            const targetTime = percent * totalDuration;
            if (isPlaying) startTime = performance.now() - targetTime * 1000;
            document.getElementById('videoProgress').style.width = (percent * 100) + '%';
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.querySelector('.mute-btn').textContent = isMuted ? '🔇' : '🔊';
            if (isMuted) window.speechSynthesis.cancel();
        }

        drawBackground();
        drawSubtitle('点击播放开始学习杠杆知识！');
    </script>
</body>
</html>
